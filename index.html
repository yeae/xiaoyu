<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>五子棋游戏</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 12px;
        }

        .container {
            width: 100%;
            max-width: 560px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 12px;
            color: #222;
        }

        .board {
            width: min(92vw, 560px);
            aspect-ratio: 1 / 1;
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            grid-template-rows: repeat(15, 1fr);
            gap: 1px;
            background-color: #8b5a2b;
            border: 2px solid #5c3b1e;
            padding: 2px;
            touch-action: manipulation;
            user-select: none;
        }

        .cell {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #f0d9b5;
            border: 1px solid rgba(0, 0, 0, 0.08);
            position: relative;
            cursor: pointer;
        }

        .cell:hover {
            background-color: #ead2ab;
        }

        .cell.x::after,
        .cell.o::after {
            content: "";
            position: absolute;
            width: 72%;
            height: 72%;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .cell.x::after {
            background-color: #222;
            box-shadow: inset -2px -2px 4px rgba(255, 255, 255, 0.15);
        }

        .cell.o::after {
            background-color: #fff;
            border: 2px solid #222;
            box-shadow: inset -2px -2px 4px rgba(0, 0, 0, 0.08);
        }

        .cell.win {
            background-color: #ffd666 !important;
        }

        .status {
            margin-top: 16px;
            font-size: 18px;
            color: #222;
            text-align: center;
            min-height: 28px;
        }

        .controls {
            margin-top: 14px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 10px 20px;
            background-color: #333;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:active {
            transform: scale(0.98);
        }

        @media (max-width: 480px) {
            .title {
                font-size: 20px;
            }

            .status {
                font-size: 16px;
            }

            button {
                font-size: 15px;
                padding: 9px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">五子棋游戏</div>
        <div class="board" id="board"></div>
        <div class="status" id="status">轮到玩家 X</div>
        <div class="controls">
            <button id="restart">重新开始</button>
        </div>
    </div>

    <script>
        const boardSize = 15;
        const board = document.getElementById("board");
        const statusText = document.getElementById("status");
        const restartButton = document.getElementById("restart");

        let currentPlayer = "x";
        let gameOver = false;
        let gameBoard = [];
        let moveCount = 0;

        function createEmptyBoard() {
            return Array.from({ length: boardSize }, () => Array(boardSize).fill(null));
        }

        function initBoard() {
            board.innerHTML = "";
            gameBoard = createEmptyBoard();
            currentPlayer = "x";
            gameOver = false;
            moveCount = 0;
            statusText.textContent = "轮到玩家 X";

            for (let row = 0; row < boardSize; row++) {
                for (let col = 0; col < boardSize; col++) {
                    const cell = document.createElement("div");
                    cell.className = "cell";
                    cell.dataset.row = row;
                    cell.dataset.col = col;
                    board.appendChild(cell);
                }
            }
        }

        function handleCellClick(event) {
            const cell = event.target.closest(".cell");
            if (!cell || gameOver) return;

            const row = Number(cell.dataset.row);
            const col = Number(cell.dataset.col);

            if (gameBoard[row][col] !== null) return;

            gameBoard[row][col] = currentPlayer;
            cell.classList.add(currentPlayer);
            moveCount++;

            const winCells = checkWinner(row, col, currentPlayer);
            if (winCells) {
                gameOver = true;
                highlightWinCells(winCells);
                statusText.textContent = `玩家 ${currentPlayer.toUpperCase()} 胜利！`;
                return;
            }

            if (moveCount === boardSize * boardSize) {
                gameOver = true;
                statusText.textContent = "平局！";
                return;
            }

            currentPlayer = currentPlayer === "x" ? "o" : "x";
            statusText.textContent = `轮到玩家 ${currentPlayer.toUpperCase()}`;
        }

        function checkWinner(row, col, player) {
            const directions = [
                [0, 1],   // 横向
                [1, 0],   // 纵向
                [1, 1],   // 主对角线
                [1, -1]   // 副对角线
            ];

            for (const [deltaRow, deltaCol] of directions) {
                const result = checkDirection(row, col, deltaRow, deltaCol, player);
                if (result.length >= 5) {
                    return result;
                }
            }

            return null;
        }

        function checkDirection(row, col, deltaRow, deltaCol, player) {
            const cells = [[row, col]];

            // 正方向查找
            for (let i = 1; i < 5; i++) {
                const newRow = row + deltaRow * i;
                const newCol = col + deltaCol * i;

                if (
                    newRow < 0 || newRow >= boardSize ||
                    newCol < 0 || newCol >= boardSize
                ) {
                    break;
                }

                if (gameBoard[newRow][newCol] === player) {
                    cells.push([newRow, newCol]);
                } else {
                    break;
                }
            }

            // 反方向查找
            for (let i = 1; i < 5; i++) {
                const newRow = row - deltaRow * i;
                const newCol = col - deltaCol * i;

                if (
                    newRow < 0 || newRow >= boardSize ||
                    newCol < 0 || newCol >= boardSize
                ) {
                    break;
                }

                if (gameBoard[newRow][newCol] === player) {
                    cells.unshift([newRow, newCol]);
                } else {
                    break;
                }
            }

            return cells;
        }

        function highlightWinCells(cells) {
            cells.forEach(([row, col]) => {
                const selector = `.cell[data-row="${row}"][data-col="${col}"]`;
                const cell = board.querySelector(selector);
                if (cell) {
                    cell.classList.add("win");
                }
            });
        }

        function restartGame() {
            initBoard();
        }

        board.addEventListener("click", handleCellClick);
        restartButton.addEventListener("click", restartGame);

        initBoard();
    </script>
</body>
</html>
